version: '3.8'

services:
  # 可转债数据 API 服务
  cb-api:
    build: .
    container_name: kezhuanzhai-api
    ports:
      - "5001:5001"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cb-network

  # 前端 API 服务（如果存在）
  frontend-api:
    build:
      context: ./frontend-api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - cb-network
    profiles:
      - frontend

networks:
  cb-network:
    driver: bridge
